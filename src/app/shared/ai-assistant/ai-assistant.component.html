@if (isAuthenticated()) {
    <!-- Floating Toggle Button -->
    <button
        (click)="toggle()"
        class="fixed bottom-6 right-6 z-50 w-14 h-14 bg-gradient-to-r from-purple-600 to-indigo-600 text-white rounded-full shadow-lg shadow-purple-300 hover:shadow-xl hover:shadow-purple-400 transition-all duration-300 flex items-center justify-center group dark:shadow-purple-900 dark:hover:shadow-purple-800"
        [ngClass]="{'rotate-0': !isOpen(), 'rotate-90': isOpen()}"
    >
        @if (!isOpen()) {
            <i class="fas fa-robot text-xl group-hover:scale-110 transition-transform"></i>
        } @else {
            <i class="fas fa-times text-xl"></i>
        }
    </button>

    <!-- Chat Panel -->
    @if (isOpen()) {
        <div class="fixed bottom-24 right-6 z-50 w-96 max-h-[500px] bg-white rounded-2xl shadow-2xl border border-gray-100 flex flex-col overflow-hidden animate-slideUp dark:bg-gray-800 dark:border-gray-700">
            <!-- Header -->
            <div class="bg-gradient-to-r from-purple-600 to-indigo-600 p-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center">
                        <i class="fas fa-robot text-white text-sm"></i>
                    </div>
                    <div>
                        <h3 class="text-white font-bold text-sm">Gemini AI Assistant</h3>
                        <p class="text-purple-200 text-xs">Powered by Google Gemini</p>
                    </div>
                </div>
                <button (click)="clearChat()" class="text-white/70 hover:text-white transition-colors text-xs">
                    <i class="fas fa-broom mr-1"></i> Clear
                </button>
            </div>

            <!-- Messages -->
            <div class="flex-1 overflow-y-auto p-4 space-y-3 min-h-[250px] max-h-[350px]">
                @for (msg of messages(); track $index) {
                    <div class="flex" [ngClass]="{'justify-end': msg.role === 'user', 'justify-start': msg.role === 'assistant'}">
                        <div class="max-w-[80%] px-3 py-2 rounded-2xl text-sm leading-relaxed"
                             [ngClass]="{
                                'bg-purple-600 text-white rounded-br-sm': msg.role === 'user',
                                'bg-gray-100 text-gray-800 rounded-bl-sm dark:bg-gray-700 dark:text-gray-200': msg.role === 'assistant'
                             }">
                            @if (msg.role === 'assistant') {
                                <i class="fas fa-robot text-purple-500 text-xs mr-1 dark:text-purple-400"></i>
                            }
                            {{ msg.content }}
                        </div>
                    </div>
                }
                @if (isLoading()) {
                    <div class="flex justify-start">
                        <div class="bg-gray-100 px-4 py-3 rounded-2xl rounded-bl-sm dark:bg-gray-700">
                            <div class="flex gap-1">
                                <div class="w-2 h-2 bg-purple-400 rounded-full animate-bounce" style="animation-delay: 0ms"></div>
                                <div class="w-2 h-2 bg-purple-400 rounded-full animate-bounce" style="animation-delay: 150ms"></div>
                                <div class="w-2 h-2 bg-purple-400 rounded-full animate-bounce" style="animation-delay: 300ms"></div>
                            </div>
                        </div>
                    </div>
                }
            </div>

            <!-- Input -->
            <div class="p-3 border-t border-gray-100 dark:border-gray-700">
                <div class="flex gap-2">
                    <input
                        type="text"
                        [(ngModel)]="userInput"
                        (keydown.enter)="sendMessage()"
                        placeholder="Ask anything..."
                        class="flex-1 px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent dark:bg-gray-700 dark:border-gray-600 dark:text-gray-100"
                        [disabled]="isLoading()"
                    >
                    <button
                        (click)="sendMessage()"
                        [disabled]="isLoading() || !userInput.trim()"
                        class="px-4 py-2 bg-purple-600 text-white rounded-xl hover:bg-purple-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        <i class="fas fa-paper-plane text-sm"></i>
                    </button>
                </div>
            </div>
        </div>
    }
}
